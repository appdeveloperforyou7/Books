<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
@page{ size:8in 10in; margin:0; }
*{ box-sizing:border-box; }
body{ margin:0; }
.b{ background:#C77A1A; color:#FFF7EA; height:10in; width:8in; display:flex; flex-direction:column;
  justify-content:center; align-items:center; text-align:center; font-family:'Source Serif 4','Noto Serif',serif; position:relative; }
.k{ font-family:'Inter',sans-serif; font-size:9pt; letter-spacing:.28em; text-transform:uppercase; margin-bottom:26pt; opacity:.92; }
.rings{ display:flex; gap:15pt; margin:14pt 0 22pt 0; }
.r{ width:1.05in; height:1.05in; border-radius:50%; border:1.6pt solid #FFF7EA; display:flex; flex-direction:column;
  justify-content:center; align-items:center; font-style:italic; font-size:11pt; }
.r span{ font-family:'Inter',sans-serif; font-size:6.5pt; font-style:normal; opacity:.7; margin-top:3pt; }
.om{ font-family:'Noto Serif Devanagari',serif; font-size:34pt; margin-top:6pt; }
.cap{ font-style:italic; font-size:11.5pt; max-width:5in; line-height:1.5; margin-top:18pt; opacity:.95; padding:0 .5in; }
.qr{ position:absolute; bottom:0.85in; right:0.85in; width:0.62in; height:0.62in; background:#FFF7EA; border-radius:3pt;
  display:flex; align-items:center; justify-content:center; font-family:'Inter',sans-serif; font-size:6pt; color:#C77A1A; font-weight:700; letter-spacing:.08em; }
</style></head><body>
<div class="b">
  <div class="k">The Bhakti Spine · Gītā 9</div>
  <div class="rings">
    <div class="r">memory<span>9.34</span></div>
    <div class="r">love<span>9.22</span></div>
    <div class="r">offering<span>9.26</span></div>
    <div class="r">surrender<span>9.30–31</span></div>
  </div>
  <div class="om">ॐ</div>
  <div class="cap">Four movements converge on the one centre: <em>remember, love, offer, surrender</em> — the whole yoga of devotion compressed into a single breath.</div>
</div>
</body></html>
