<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="2560" viewBox="0 0 1600 2560">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a12"/>
      <stop offset="50%" style="stop-color:#141428"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c9a84c"/>
      <stop offset="100%" style="stop-color:#e8c96a"/>
    </linearGradient>
    <linearGradient id="goldGlow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#e8c96a;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#c9a84c;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1600" height="2560" fill="url(#bg)"/>

  <!-- Subtle texture lines -->
  <g opacity="0.03">
    <line x1="0" y1="400" x2="1600" y2="400" stroke="#c9a84c" stroke-width="1"/>
    <line x1="0" y1="600" x2="1600" y2="600" stroke="#c9a84c" stroke-width="1"/>
    <line x1="0" y1="1800" x2="1600" y2="1800" stroke="#c9a84c" stroke-width="1"/>
    <line x1="0" y1="2000" x2="1600" y2="2000" stroke="#c9a84c" stroke-width="1"/>
  </g>

  <!-- Top decorative line -->
  <line x1="200" y1="320" x2="1400" y2="320" stroke="url(#accent)" stroke-width="2" opacity="0.6"/>

  <!-- Eye symbol (the watcher) -->
  <g transform="translate(800, 700)" filter="url(#glow)" opacity="0.15">
    <ellipse cx="0" cy="0" rx="280" ry="180" fill="none" stroke="#c9a84c" stroke-width="3"/>
    <circle cx="0" cy="0" r="90" fill="none" stroke="#c9a84c" stroke-width="3"/>
    <circle cx="0" cy="0" r="30" fill="#c9a84c" opacity="0.8"/>
    <line x1="-280" y1="0" x2="-90" y2="0" stroke="#c9a84c" stroke-width="2"/>
    <line x1="90" y1="0" x2="280" y2="0" stroke="#c9a84c" stroke-width="2"/>
  </g>

  <!-- Gold glow behind title -->
  <ellipse cx="800" cy="1150" rx="500" ry="200" fill="url(#goldGlow)"/>

  <!-- Series label -->
  <text x="800" y="950" text-anchor="middle" font-family="Georgia, serif" font-size="32" fill="#c9a84c" letter-spacing="8" opacity="0.8">ELENA VANCE</text>

  <!-- Title -->
  <text x="800" y="1100" text-anchor="middle" font-family="Georgia, serif" font-size="120" fill="#f5f0e8" font-weight="bold" letter-spacing="4">The</text>
  <text x="800" y="1240" text-anchor="middle" font-family="Georgia, serif" font-size="140" fill="#f5f0e8" font-weight="bold" letter-spacing="6">Quiet</text>
  <text x="800" y="1380" text-anchor="middle" font-family="Georgia, serif" font-size="140" fill="#f5f0e8" font-weight="bold" letter-spacing="6">Wife</text>

  <!-- Subtitle line -->
  <line x1="500" y1="1450" x2="1100" y2="1450" stroke="url(#accent)" stroke-width="1.5" opacity="0.7"/>

  <!-- Subtitle -->
  <text x="800" y="1520" text-anchor="middle" font-family="Georgia, serif" font-size="40" fill="#c9a84c" font-style="italic" letter-spacing="3">A Novel</text>

  <!-- Decorative diamond -->
  <g transform="translate(800, 1650)" opacity="0.6">
    <rect x="-8" y="-8" width="16" height="16" fill="#c9a84c" transform="rotate(45)"/>
  </g>

  <!-- Tagline -->
  <text x="800" y="1750" text-anchor="middle" font-family="Georgia, serif" font-size="34" fill="#a89e8a" font-style="italic">She reads people for a living.</text>
  <text x="800" y="1810" text-anchor="middle" font-family="Georgia, serif" font-size="34" fill="#a89e8a" font-style="italic">She never saw this coming.</text>

  <!-- Bottom decorative line -->
  <line x1="200" y1="2100" x2="1400" y2="2100" stroke="url(#accent)" stroke-width="2" opacity="0.6"/>

  <!-- Author -->
  <text x="800" y="2220" text-anchor="middle" font-family="Georgia, serif" font-size="44" fill="#f5f0e8" letter-spacing="6">RISHABH</text>

  <!-- Series info -->
  <text x="800" y="2320" text-anchor="middle" font-family="Georgia, serif" font-size="28" fill="#c9a84c" letter-spacing="4" opacity="0.8">ELENA VANCE — BOOK ONE</text>

  <!-- Bottom accent -->
  <g transform="translate(800, 2440)" opacity="0.4">
    <line x1="-100" y1="0" x2="-20" y2="0" stroke="#c9a84c" stroke-width="1"/>
    <rect x="-4" y="-4" width="8" height="8" fill="#c9a84c" transform="rotate(45)"/>
    <line x1="20" y1="0" x2="100" y2="0" stroke="#c9a84c" stroke-width="1"/>
  </g>
</svg>
